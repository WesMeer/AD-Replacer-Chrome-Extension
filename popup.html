<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      background-color: #f4f4f9;
    }
    h3 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: background 0.2s;
    }
    #toggle-btn {
      background-color: #2ecc71;
      color: white;
    }
    #toggle-btn.disabled {
      background-color: #e74c3c;
    }
    #test-btn {
      background-color: #3498db;
      color: white;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h3>Meme Replacer</h3>
  <button id="toggle-btn">Extension: ON</button>
  <button id="test-btn">Open Test Page</button>
  <script src="popup.js"></script>
</body>
</html>
