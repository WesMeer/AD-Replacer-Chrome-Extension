<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Extension - Video Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin-bottom: 30px;
      color: #3498db;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .video-card {
      background: #222;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      border: 1px solid #333;
    }
    video {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: black;
    }
    .video-info {
      padding: 12px;
      font-size: 14px;
      font-family: monospace;
      color: #bbb;
      text-align: left;
      border-top: 1px solid #333;
    }
    .video-number {
      color: #3498db;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Meme Ad Replacer - Video Gallery</h1>
  <div id="gallery" class="gallery"></div>

  <script src="testpage.js"></script>
</body>
</html>
